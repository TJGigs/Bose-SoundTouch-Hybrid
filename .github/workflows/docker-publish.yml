name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
  # Versioned builds trigger off publishing a GitHub Release (not the tag push
  # itself) so github.event.release.prerelease is available to gate the
  # 'latest' tag below. Draft a release + check "Set as a pre-release" for
  # betas; publishing without that box checked is what makes 'latest' move.
  release:
    types: [ "published" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up QEMU for ARM emulation (Raspberry Pi support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx for multi-architecture builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. ADDED: Smart Metadata Extraction
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tjgigs/bose-soundtouch-hybrid-2026
          tags: |
            type=edge,branch=main
            type=match,pattern=(v.*),group=1
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Fixes NAS 'manifest unknown' errors
          provenance: false
          # Builds for PC/NAS, Raspberry Pi (64-bit), and older Pi (32-bit)
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # Uses the smart tags generated by the metadata action above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Publishes the HA Supervisor add-on image referenced by ha-addon/config.yaml's
  # `image:` key. Built per-arch (not as one multi-platform manifest) because the
  # Dockerfile needs a different BUILD_FROM (HA base image) per arch, which a
  # single `docker buildx build --platform a,b,c` invocation can't vary per
  # platform. base_image values below must stay in sync with ha-addon/build.yaml
  # by hand — not worth a drift-checker script for values that change maybe once
  # a year.
  build-addon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.19
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.19
          - arch: armv7
            platform: linux/arm/v7
            base_image: ghcr.io/home-assistant/armv7-base:3.19

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags this exactly like the main app image (edge on main-branch pushes,
      # the literal release tag on a v* tag push) so the add-on image can
      # never drift from the main app's version again. sync-addon-version
      # (below) writes this same tag into ha-addon/config.yaml so Supervisor
      # pulls the matching image.
      - name: Extract metadata for ${{ matrix.arch }} add-on
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tjgigs/${{ matrix.arch }}-addon-bose-soundtouch-hybrid-2026
          tags: |
            type=edge,branch=main
            type=match,pattern=(v.*),group=1

      - name: Build and push ${{ matrix.arch }} add-on image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha-addon/Dockerfile
          push: true
          provenance: false
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Keeps ha-addon/config.yaml's version field (what Supervisor reads to know
  # which image tag to pull) locked to the tag just published above, so the
  # HA add-on version can never silently drift from the main app version
  # again. Only runs on an actual release tag push, not routine main pushes.
  sync-addon-version:
    needs: build-addon
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync ha-addon/config.yaml version to ${{ github.ref_name }}
        run: |
          NEW_VERSION="${GITHUB_REF_NAME}"
          sed -i "s/^version: .*/version: \"${NEW_VERSION}\"/" ha-addon/config.yaml

          # Fail loudly rather than silently leaving Supervisor pointed at a
          # stale tag if config.yaml's format ever changes in a way that
          # breaks this sed pattern.
          if ! grep -q "^version: \"${NEW_VERSION}\"\$" ha-addon/config.yaml; then
            echo "::error::Failed to sync ha-addon/config.yaml version to ${NEW_VERSION} — check the file's format hasn't changed."
            exit 1
          fi

          if git diff --quiet ha-addon/config.yaml; then
            echo "ha-addon/config.yaml already at ${NEW_VERSION}, nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          git commit -m "chore: sync add-on version to ${NEW_VERSION} [skip ci]"
          git push origin HEAD:main