name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up QEMU for ARM emulation (Raspberry Pi support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx for multi-architecture builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. ADDED: Smart Metadata Extraction
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tjgigs/bose-soundtouch-hybrid-2026
          tags: |
            type=edge,branch=main
            type=match,pattern=(v.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Fixes NAS 'manifest unknown' errors
          provenance: false
          # Builds for PC/NAS, Raspberry Pi (64-bit), and older Pi (32-bit)
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # Uses the smart tags generated by the metadata action above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Publishes the HA Supervisor add-on image referenced by ha-addon/config.yaml's
  # `image:` key. Built per-arch (not as one multi-platform manifest) because the
  # Dockerfile needs a different BUILD_FROM (HA base image) per arch, which a
  # single `docker buildx build --platform a,b,c` invocation can't vary per
  # platform. base_image values below must stay in sync with ha-addon/build.yaml
  # by hand — not worth a drift-checker script for values that change maybe once
  # a year.
  build-addon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.19
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.19
          - arch: armv7
            platform: linux/arm/v7
            base_image: ghcr.io/home-assistant/armv7-base:3.19

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version from config.yaml
        id: addon_version
        run: |
          version=$(grep '^version:' ha-addon/config.yaml | head -1 | sed -E 's/version: *"?([^"]*)"?/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.arch }} add-on image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha-addon/Dockerfile
          push: true
          provenance: false
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          tags: |
            ghcr.io/tjgigs/${{ matrix.arch }}-addon-bose-soundtouch-hybrid-2026:${{ steps.addon_version.outputs.version }}
            ghcr.io/tjgigs/${{ matrix.arch }}-addon-bose-soundtouch-hybrid-2026:latest